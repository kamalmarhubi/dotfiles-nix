[user]
name = "Kamal Al Marhubi"
email = "kamal@marhubi.com"

[ui]
default-command = "log"
diff-formatter = "delta"
[[--scope]]
# Use `:git` under coding agents for more machine-legible diffs. Each marker
# was checked against the tool's source or observed empirically.
--when.environments = [
    "AGENT",  # Proposed standard at agentsmd/agents.md#136; used by amp, goose
    "CLAUDECODE",
    "CODEX_THREAD_ID",
    "OPENCODE",
    "PI_CODING_AGENT",
    "GEMINI_CLI",
]
[--scope.ui]
diff-formatter = ":git"

[aliases]
hunk = ["util", "exec", "--", "jj-hunk"]

[revset-aliases]
# Empty non-merge commits, blank descriptions, and WIP markers are scratch work.
'incomplete()' = '''((empty() & ~merges()) | description("") | description(regex-i:'^(wip|tktk)\b')) ~ root()'''

# Workstream-based log flow. A "workstream" lives entirely under `kamal/<slug>/`:
# it is rooted by an empty commit bookmarked `kamal/<slug>/base`, and commits
# pushed out of it (rebased onto trunk) are bookmarked
# `kamal/<slug>/<date>-<change_id>` by `git_push_bookmark`. Everything else
# should "just work".

# Workspaces specify a workstream by overriding `workstream_base()` (the base
# bookmark) and `workstream_pushed()` (its pushed bookmarks, via the glob helper):
#
#   [revset-aliases]
#   'workstream_base()'   = 'kamal/<slug>/base'
#   'workstream_pushed()' = 'workstream_pushed("kamal/<slug>/*")'
#
# TODO(jj-vcs/jj#5895): Replace this with a slug-based `workstream()`. Once `glob:`
# accepts `concat()`, base and pushed both derive from one slug instead of being
# restated per workspace (see the factored-out aliases below).
'workstream()' = '""'
'workstream_prefix()' = '"kamal/"'
# TODO(jj-vcs/jj#5895): Replace inlined workstream_prefix().
'workstream_bases()' = '''bookmarks(regex:"^kamal/[^/]+/base$")'''

# `workstream_pushed(pat)`: bookmarks under glob `pat`, minus the base. Callers
# always pass a glob; once jj#5895 lands, that glob can be built from a slug via
# concat() upstream (a `workstream()` returning "<slug>") and fed to this same
# helper, e.g.:
# 'workstream_base(name)' = '''bookmarks(glob:concat(workstream_prefix(), name, "/base"))'''
# 'workstream_pushed()'   = '''workstream_pushed(concat(workstream_prefix(), workstream(), "/*"))'''
'workstream_base()' = '''none()'''
'workstream_pushed()' = '''none()'''
'workstream_pushed(pat)' = '''bookmarks(glob:pat) ~ workstream_base()'''

# The live workstream (full mutable stacks reachable from the base), plus commits
# already pushed out onto trunk and their local descendants, minus whatever has
# since merged. `~ ::trunk()` both drops merged work and stops `descendants()`
# from walking down all of trunk once a pushed commit lands there.
'workstream_log_context(base)' = '''reachable(base, mutable()) | (descendants(workstream_pushed()) ~ ::trunk())'''
'workstream_log_context()' = '''workstream_log_context(workstream_base())'''
'global_log_context()' = 'ancestors(immutable_heads().., 2)'

# "default_blah" are so that repos can be customised without repeating the basics.
'default_private_commits()' = "(incomplete() & mine()) | descendants(workstream_bases())"
'default_log()' = '''present(@) | trunk() | coalesce(workstream_log_context(), global_log_context())'''

[git]
private-commits = 'default_private_commits()'

[template-aliases]
# `is_workstream_base(name)`: does `name` match a workstream base bookmark,
# i.e. `^kamal/[^/]+/base$`? The template DSL has no regex, hence the
# prefix/suffix dance. Used by `workstream_push_prefix()` in conf.d/wave.toml.
'is_workstream_base(name)' = '''
  name.starts_with("kamal/")
  && name.remove_prefix("kamal/").ends_with("/base")
  && (name.remove_prefix("kamal/").remove_suffix("/base") != "")
  && !name.remove_prefix("kamal/").remove_suffix("/base").contains("/")
'''

'format_commit_labels(commit)' = '''
  separate(" ",
    coalesce(
      if(commit.hidden(), label("hidden", "(hidden)")),
      if(commit.divergent(), label("divergent", "(divergent)")),
    ),
    if(commit.conflict(), label("conflict", "(conflict)")),
    if(commit.contained_in("workstream_bases()") && !commit.empty(),
      label("jj_base_nonempty", "NONEMPTY-BASE"),
    ),
  )
'''
[colors]
"node jj_base_nonempty" = { reverse = true }
jj_base_nonempty = { fg = "ansi-color-202", bold = true }

[templates]
log_node = '''
label(
  if(
    self && self.contained_in("workstream_bases()") && !self.empty(),
    "jj_base_nonempty"
  ),
  if(config("ui.graph.style").as_string().starts_with("ascii"),
    builtin_log_node_ascii,
    builtin_log_node
  )
)
'''

[revsets]
# For bare `jj bookmark advance`, move through complete commits above the
# nearest ancestor bookmark, but stop before scratch work instead of skipping it.
bookmark-advance-to = "heads(::@ ~ (incomplete() & (bookmarks()..@))::)"
log = "default_log()"

[merge-tools.delta]
diff-expected-exit-codes = [0, 1]
diff-args = [
  "--side-by-side",
  # HACK: Work around what is probably an upstream bug in delta.
  # Force delta to use a/b prefixes on its `git diff --no-index` call, so that
  # it is able to get the name for the header on added / deleted files...
  "--diff-args=--src-prefix=a/ --dst-prefix=b/",
  # ... then clean up the left/right names that jj uses.
  "--file-transformation=s#^(left|right)/##",
  "$left",
  "$right",
  "--width=$width",
]
