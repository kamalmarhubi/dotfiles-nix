[user]
name = "Kamal Al Marhubi"
email = "kamal@marhubi.com"

[ui]
default-command = "log"
diff-formatter = "delta"
[[--scope]]
# Use `:git` under coding agents for more machine-legible diffs. Each marker
# was checked against the tool's source or observed empirically.
--when.environments = [
    "AGENT",  # Proposed standard at agentsmd/agents.md#136; used by amp, goose
    "CLAUDECODE",
    "CODEX_THREAD_ID",
    "OPENCODE",
    "PI_CODING_AGENT",
    "GEMINI_CLI",
]
[--scope.ui]
diff-formatter = ":git"

[aliases]
hunk = ["util", "exec", "--", "jj-hunk"]
try = ["util", "exec", "--", "jj-try"]
sprout = ["new", "trunk() | grove_marker()"]
grove = ["util", "exec", "--", "jj-grove"]
gh-fork = ["util", "exec", "--", "jj-gh-fork"]

[revset-aliases]
# Empty non-merge commits, blank descriptions, wip/tktk descriptions, and empty
# marker-descendant merge commits are scratch work.
'incomplete()' = '''((empty() & (~merges() | descendants(grove_markers()))) | description("") | description(regex-i:'^(wip|tktk)\b')) ~ root()'''

# A "grove" is a cluster of related work marked by an empty orphan commit. It's
# the unit the default log is organised around, and lives entirely under
# `kamal/<slug>/`: marked by `kamal/<slug>/__marker__`, with commits pushed out of it
# (by dropping the marker parent) bookmarked `kamal/<slug>/<date>-<change_id>` by
# `git_push_bookmark`. Everything else should "just work".

# Workspaces specify a grove by overriding `grove_marker()` (the marker
# bookmark) and `grove_bookmarks()` (its pushed bookmarks, via the glob helper):
#
#   [revset-aliases]
#   'grove_marker()' = 'kamal/<slug>/__marker__'
#   'grove_bookmarks()' = 'grove_bookmarks("kamal/<slug>/*")'
#
'grove_prefix()' = '"kamal/"'
# TODO(jj-vcs/jj#5895): Replace inlined grove_prefix().
'grove_markers()' = '''bookmarks(regex:"^kamal/[^/]+/__marker__$")'''

# `grove_bookmarks(pat)`: bookmarks under glob `pat`, minus markers. If / when
# jj#5895 gives a way to interpolate values into revsets, marker and pushed can
# derive from one per-workspace slug instead of being restated, eg:
#   'grove_marker()' = '''bookmarks(glob:concat(grove_prefix(), <slug>, "/__marker__"))'''
#   'grove_bookmarks()' = '''grove_bookmarks(concat(grove_prefix(), <slug>, "/*"))'''
'grove_marker()' = '''none()'''
'grove_bookmarks()' = '''none()'''
'grove_bookmarks(pat)' = '''bookmarks(glob:pat) ~ grove_markers()'''

# `grove(r)`: live mutable stacks descending from marker `r`, plus
# pushed-but-unmerged commits. `~ ::trunk()` drops merged commits and keeps
# `descendants()` off the rest of trunk.
# `grove()` is the current workspace's grove, usable as `jj log -r grove()`.
'grove(r)' = '''(descendants(r) & mutable()) | (descendants(grove_bookmarks()) ~ ::trunk())'''
'grove()' = '''grove(grove_marker())'''
'global_log_context()' = 'ancestors(immutable_heads().., 2)'

# "default_blah" are so that repos can be customised without repeating the basics.
'default_private_commits()' = "(incomplete() & mine()) | descendants(grove_markers())"
'default_log()' = '''ancestors(@, 3) | descendants(@, 3) | trunk() | trunk()..@ | coalesce(grove(), global_log_context())'''

[git]
private-commits = 'default_private_commits()'

[template-aliases]
# `is_grove_marker(name)`: does `name` match a grove marker bookmark,
# ie `^kamal/[^/]+/__marker__$`? The template DSL has no regex, hence the
# prefix/suffix dance. Used by `grove_push_prefix()` in conf.d/wave.toml.
'is_grove_marker(name)' = '''
  name.starts_with("kamal/")
  && name.remove_prefix("kamal/").ends_with("/__marker__")
  && (name.remove_prefix("kamal/").remove_suffix("/__marker__") != "")
  && !name.remove_prefix("kamal/").remove_suffix("/__marker__").contains("/")
'''

'format_commit_labels(commit)' = '''
  separate(" ",
    coalesce(
      if(commit.hidden(), label("hidden", "(hidden)")),
      if(commit.divergent(), label("divergent", "(divergent)")),
    ),
    if(commit.conflict(), label("conflict", "(conflict)")),
    if(commit.contained_in("grove_markers()") && !commit.empty(),
      label("grove_marker_nonempty", "NONEMPTY-MARKER"),
    ),
    if(commit.current_working_copy()
       && is_grove_marker(config('revset-aliases."grove_marker()"').as_string())
       && !commit.contained_in("grove()"),
      label("grove_off_marker", "off-grove:" ++
        config('revset-aliases."grove_marker()"').as_string().remove_prefix("kamal/").remove_suffix("/__marker__")),
    ),
  )
'''
[colors]
"node grove_marker_nonempty" = { reverse = true }
grove_marker_nonempty = { fg = "ansi-color-202", bold = true }
grove_off_marker = { fg = "red", bold = true }

[templates]
log_node = '''
label(
  if(
    self && self.contained_in("grove_markers()") && !self.empty(),
    "grove_marker_nonempty"
  ),
  if(config("ui.graph.style").as_string().starts_with("ascii"),
    builtin_log_node_ascii,
    builtin_log_node
  )
)
'''

[revsets]
# For bare `jj bookmark advance`, move through complete commits above the
# nearest ancestor bookmark, but stop before scratch work instead of skipping it.
bookmark-advance-from = "heads((::to & bookmarks()) ~ grove_markers())"
bookmark-advance-to = "heads(::@ ~ descendants(grove_markers()) ~ (incomplete() & (bookmarks()..@))::)"
log = "default_log()"

[merge-tools.delta]
diff-expected-exit-codes = [0, 1]
diff-args = [
  "--side-by-side",
  # HACK: Work around what is probably an upstream bug in delta.
  # Force delta to use a/b prefixes on its `git diff --no-index` call, so that
  # it is able to get the name for the header on added / deleted files...
  "--diff-args=--src-prefix=a/ --dst-prefix=b/",
  # ... then clean up the left/right names that jj uses.
  "--file-transformation=s#^(left|right)/##",
  "$left",
  "$right",
  "--width=$width",
]
