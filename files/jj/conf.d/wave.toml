[[--scope]]
--when.repositories = ["~/wave"]

[--scope.user]
email = "kamal@wave.com"

[--scope.template-aliases]
# Push-bookmark prefix for this workspace's grove: `kamal/<slug>/` derived
# from `grove_marker()` (`kamal/<slug>/__marker__`), or plain `kamal/` when unset.
'grove_push_prefix()' = '''
  if(is_grove_marker(config('revset-aliases."grove_marker()"').as_string()),
    config('revset-aliases."grove_marker()"').as_string().remove_suffix("__marker__"),
    "kamal/")
'''

[--scope.templates]
git_push_bookmark = 'grove_push_prefix() ++ author.timestamp().local().format("%Y-%m-%d") ++ "-" ++ change_id.short()'
